<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AP Plus</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f6f8; font-family: Arial, Helvetica, sans-serif;">

  <!-- Wrapper -->
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f6f8; padding:20px 0;">
    <tr>
      <td align="center">

        <!-- Main Container -->
        <table width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff; border-radius:6px; overflow:hidden; box-shadow:0 2px 6px rgba(0,0,0,0.05);">

          <!-- Header -->
          <tr>
            <td style="background-color:#0A66C2; padding:20px; text-align:center;">
              <h1 style="margin:0; color:#ffffff; font-size:22px; font-weight:600;">
                AP Plus
              </h1>
              <p style="margin:5px 0 0; color:#dce9f9; font-size:14px;">
                Smart. Secure. Connected.
              </p>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:30px; color:#333333; font-size:15px; line-height:1.6;">
              
              <p style="margin-top:0;">
                Hello {{user_name}},
              </p>

              <p>
                {{message_body}}
              </p>

              <!-- Optional Call-to-Action -->
              <p style="text-align:center; margin:30px 0;">
                <a href="{{action_url}}" 
                   style="background-color:#0ac235; color:#ffffff; text-decoration:none; 
                          padding:12px 24px; border-radius:4px; font-size:14px; display:inline-block;">
                  {{action_text}}
                </a>
              </p>

              <p>
                If you have any questions or need assistance, please contact our support team.
              </p>

              <p style="margin-bottom:0;">
                Regards,<br />
                <strong>The AP Plus Team</strong>
              </p>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color:#f0f2f5; padding:20px; text-align:center; font-size:12px; color:#666666;">
              <p style="margin:0;">
                © {{year}} AP Plus. All rights reserved.
              </p>
              <p style="margin:5px 0 0;">
                This email was sent automatically. Please do not reply.
              </p>
            </td>
          </tr>

        </table>
        <!-- End Main Container -->

      </td>
    </tr>
  </table>
  <!-- End Wrapper -->

</body>
</html>
